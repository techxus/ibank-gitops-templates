name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name"
        required: true
        type: string

      docker_image:
        description: "Docker image repo"
        required: true
        type: string

      environment:
        description: "Environment label (dev/stage/prod)"
        required: true
        type: string

      java_version:
        description: "Java version"
        required: false
        default: "17"
        type: string

      maven_args:
        description: "Extra Maven args"
        required: false
        default: "-DskipTests"
        type: string

      ibank_version:
        description: "Published ibank version from parent repo"
        required: false
        default: ""
        type: string

    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: read
  packages: read

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout service repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Resolve Maven command
        id: mvn_cmd
        shell: bash
        run: |
          if [ -n "${{ inputs.ibank_version }}" ]; then
            echo "cmd=mvn -B -U clean package -Drevision=${{ inputs.ibank_version }} ${{ inputs.maven_args }}" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=mvn -B -U clean package ${{ inputs.maven_args }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with Maven
        run: ${{ steps.mvn_cmd.outputs.cmd }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify bootable jar
        run: |
          unzip -p target/*.jar META-INF/MANIFEST.MF | grep -E 'Main-Class|Start-Class'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ inputs.docker_image }}:${{ inputs.image_version }}
            ${{ inputs.docker_image }}:git-${{ github.sha }}
          provenance: false